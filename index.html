<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPN-0Fers V1</title>
<link href="https://fonts.cdnfonts.com/css/futura-std-4" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10; --surface:#12151c; --surface2:#1a1e28; --surface3:#0d0f14;
    --border:#252a38; --border2:#1e2230;
    --text:#e8eaf0; --muted:#6b7280; --dimmed:#2e3448;
    --live:#ff3b3b; --green:#00c97a; --espn-red:#d00000;
    /* team colors — set dynamically per side */
    --vis-primary:#888; --vis-dark:#333; --vis-light:#aaa;
    --hom-primary:#888; --hom-dark:#333; --hom-light:#aaa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Roboto Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* ══ HEADER ══════════════════════════════════════════════════════════════ */
  header{
    background:linear-gradient(135deg,#0d0f14 0%,#16111f 100%);
    border-bottom:3px solid var(--espn-red);
    padding:10px 22px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:200;
  }
  .hdr-l{display:flex;align-items:center;gap:14px;}
  .espn-badge{
    background:var(--espn-red);color:#fff;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:1px;
    padding:3px 16px 3px 10px;
    clip-path:polygon(0 0,90% 0,100% 100%,0% 100%);
    flex-shrink:0;
  }
  .hdr-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#ccc;}
  .live-pill{display:none;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--live);letter-spacing:2px;border:1px solid var(--live);padding:2px 8px;}
  .live-pill.on{display:flex;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.1s infinite;}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.25;transform:scale(0.5)}}

  .hdr-r{display:flex;align-items:center;gap:10px;}
  .timer-txt{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}
  .timer-txt b{color:#f5a623;}
  .btn{background:var(--espn-red);color:#fff;border:none;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;padding:6px 16px;cursor:pointer;text-transform:uppercase;transition:background 0.15s;}
  .btn:hover{background:#ff2020;}
  .btn.ghost{background:transparent;border:1px solid var(--dimmed);color:#f5a623;}
  .btn.ghost:hover{border-color:#f5a623;}

  /* ══ LOAD BAR ════════════════════════════════════════════════════════════ */
  .load-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .color-picker-group{display:flex;align-items:center;gap:7px;padding-left:12px;border-left:1px solid var(--border);}
  .color-picker-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
  .team-color-swatch{
    width:28px;height:28px;border-radius:4px;border:2px solid #555;
    cursor:pointer;padding:0;background:none;outline:none;
    -webkit-appearance:none;
  }
  .team-color-swatch::-webkit-color-swatch-wrapper{padding:0;border-radius:3px;}
  .team-color-swatch::-webkit-color-swatch{border:none;border-radius:2px;}
  .team-name-badge{
    font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
    padding:2px 7px;border:1px solid #444;color:#aaa;white-space:nowrap;
    max-width:90px;overflow:hidden;text-overflow:ellipsis;
  }
  .load-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;white-space:nowrap;}
  .file-wrap{position:relative;}
  .file-btn{background:var(--surface);border:1px dashed var(--dimmed);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:border-color 0.2s;display:block;}
  .file-btn:hover{border-color:#f5a623;}
  .file-name{font-family:'Share Tech Mono',monospace;font-size:10px;color:#f5a623;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .status-chip{display:flex;align-items:center;gap:6px;margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border:1px solid var(--border);}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--dimmed);flex-shrink:0;}
  .sdot.ok{background:var(--green);}
  .sdot.err{background:var(--espn-red);}
  .sdot.spin{background:#f5a623;animation:blink 0.7s infinite;}

  /* ══ SCORE BAR ═══════════════════════════════════════════════════════════ */
  .score-bar{display:none;border-bottom:1px solid var(--border);padding:0;}
  .score-bar.on{display:flex;flex-direction:column;}
  .score-inner{display:flex;align-items:stretch;}

  .score-side{
    flex:1;display:flex;align-items:center;gap:14px;padding:10px 22px;
    position:relative;overflow:hidden;
  }
  .score-side.vis{background:linear-gradient(135deg, color-mix(in srgb, var(--vis-dark) 90%, transparent) 0%, var(--surface3) 100%);}
  .score-side.hom{background:linear-gradient(135deg, var(--surface3) 0%, color-mix(in srgb, var(--hom-dark) 90%, transparent) 100%);flex-direction:row-reverse;}
  .score-side::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);
    pointer-events:none;
  }

  .s-team-info{display:flex;flex-direction:column;gap:2px;}
  .s-school{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1;}
  .s-record{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
  .s-score-num{font-family:'Oswald',sans-serif;font-size:46px;font-weight:700;line-height:1;min-width:50px;text-align:center;}
  .score-side.vis .s-school{color:var(--vis-primary);}
  .score-side.vis .s-score-num{color:var(--vis-primary);}
  .score-side.hom .s-school{color:var(--hom-primary);text-align:right;}
  .score-side.hom .s-score-num{color:var(--hom-primary);}
  .score-side.hom .s-record{text-align:right;}

  .score-mid{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 20px;background:var(--surface3);border-left:1px solid var(--border);border-right:1px solid var(--border);
    gap:4px;min-width:120px;
  }
  .inn-badge{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--live);border:1px solid var(--live);padding:2px 10px;letter-spacing:1px;white-space:nowrap;}
  .count-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-align:center;}
  .at-bat-txt{font-family:'Share Tech Mono',monospace;font-size:9px;color:#f5a623;letter-spacing:1px;text-align:center;}

  /* ══ MAIN GRID ═══════════════════════════════════════════════════════════ */
  /* Team toggle tabs */
  .team-tabs{display:none;background:var(--surface2);border-bottom:1px solid var(--border);}
  .team-tabs.visible{display:flex;}
  .team-tab{
    flex:1;padding:10px 8px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;
    letter-spacing:2px;text-transform:uppercase;text-align:center;cursor:pointer;
    border:none;background:transparent;color:var(--muted);transition:all 0.2s;
    border-bottom:3px solid transparent;
  }
  .team-tab.vis.active{color:var(--vis-primary);border-bottom-color:var(--vis-primary);background:color-mix(in srgb, var(--vis-dark) 30%, transparent);}
  .team-tab.hom.active{color:var(--hom-primary);border-bottom-color:var(--hom-primary);background:color-mix(in srgb, var(--hom-dark) 30%, transparent);}
  .team-tab.both.active{color:#f5a623;border-bottom-color:#f5a623;}
  .team-tab:hover{color:var(--text);}

  .main{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 168px);}
  .t-panel{padding:12px;overflow-y:auto;}
  .t-panel.vis{border-right:1px solid var(--border);border-top:3px solid var(--vis-primary);}
  .t-panel.hom{border-top:3px solid var(--hom-primary);}

  /* Mobile responsive */
  @media (max-width: 768px) {
    header{padding:8px 12px;}
    .hdr-title{font-size:14px;letter-spacing:1px;}
    .espn-badge{font-size:14px;padding:3px 10px 3px 8px;}
    .timer-txt{font-size:9px;}
    .btn{font-size:11px;padding:5px 10px;}
    .load-bar{padding:7px 12px;gap:8px;}
    .load-lbl{font-size:9px;}
    .file-btn{font-size:10px;padding:5px 10px;}
    .file-name{display:none;}
    .status-chip{font-size:9px;padding:3px 7px;}
    .score-inner{flex-direction:column;}
    .score-side{padding:8px 12px;gap:10px;}
    .score-side.hom{flex-direction:row;}
    .s-score-num{font-size:34px;}
    .s-school{font-size:16px;}
    .score-mid{flex-direction:row;padding:6px 12px;min-width:unset;border:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .main{grid-template-columns:1fr;}
    .t-panel.vis{border-right:none;}
    .t-panel{padding:8px;}
    .p-name{font-size:22px;}
    .p-uni{font-size:40px;}
    .sv{font-size:13px;}
    .ofer-val{font-size:28px;}
    .copy-btn{font-size:10px;padding:4px 10px;}
    .queue-lbl{font-size:8px;}
    .pcard-hdr{padding:5px 8px;}
  }

  .t-hdr{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding-bottom:8px;border-bottom:1px solid var(--border2);margin-bottom:10px;
  }
  .t-hdr-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .t-panel.vis .t-hdr-name{color:var(--vis-primary);}
  .t-panel.hom .t-hdr-name{color:var(--hom-primary);}
  .t-hdr-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}

  /* ══ PLAYER CARD ══════════════════════════════════════════════════════════ */
  /* ══════════════════════════════════════════════════════════════════════════
     ESPN GRAPHIC CARD — pixel-faithful recreation of the on-air lower-third
     ══════════════════════════════════════════════════════════════════════════ */

  /* parchment texture via CSS — no images needed */
  .pcard{
    margin-bottom:10px;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,0.7));
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
  }
  .pcard.at-bat{ filter:drop-shadow(0 3px 14px rgba(0,0,0,0.9)); }

  /* ── ROW 1: Header strip ─ "#52 FIRST NAME LAST NAME  3B | HEADER TEXT" ── */
  .pcard-hdr{
    display:flex;align-items:stretch;
    height:42px;overflow:hidden;
    background:#1a1a1a;
    border:1px solid #444;border-bottom:none;
  }
  /* left chunk: number + name + pos */
  .pcard-hdr-left{
    display:flex;align-items:center;gap:5px;
    padding:0 8px 0 6px;
    background:#000000;
    flex:1;
    border-right:3px solid #888; /* thin divider before HEADER text */
    min-width:0;
  }
  .t-panel.vis .pcard-hdr-left{border-right-color:var(--vis-primary);}
  .t-panel.hom .pcard-hdr-left{border-right-color:var(--hom-primary);}
  .t-panel.vis .pcard.at-bat .pcard-hdr-left{background:color-mix(in srgb,var(--vis-dark) 70%,#1a1a1a);}
  .t-panel.hom .pcard.at-bat .pcard-hdr-left{background:color-mix(in srgb,var(--hom-dark) 70%,#1a1a1a);}

  .p-spot{ display:none; } /* not in ESPN graphic */
  .p-uni{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:48px;font-weight:900;letter-spacing:-1px;
    color:#ffffff;flex-shrink:0;line-height:1;
    text-shadow:0 1px 4px rgba(0,0,0,0.8);
  }
  .t-panel.vis .p-uni{color:var(--vis-primary);}
  .t-panel.hom .p-uni{color:var(--hom-primary);}

  .p-name{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:24px;font-weight:800;letter-spacing:1px;
    text-transform:uppercase;flex:1;line-height:1;color:#ffffff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
  }
  .t-panel.vis .pcard.at-bat .p-name{color:var(--vis-primary);}
  .t-panel.hom .pcard.at-bat .p-name{color:var(--hom-primary);}

  .p-pos{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:14px;font-weight:700;color:#b99;
    flex-shrink:0;text-transform:uppercase;letter-spacing:1px;
  }

  /* right chunk: HEADER text (queue position / on deck / in the hole) */
  .pcard-hdr-right{
    display:flex;align-items:center;
    padding:0 8px;
    background:#1a1a1a;
    flex-shrink:0;
  }
  .queue-lbl{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:11px;font-weight:800;letter-spacing:2px;
    color:#999;white-space:nowrap;text-transform:uppercase;
    border:none;padding:0;background:none;
  }
  .queue-now{ color:#fff; }
  .t-panel.vis .queue-now{color:var(--vis-primary);}
  .t-panel.hom .queue-now{color:var(--hom-primary);}
  .ab-arrow{display:none;} /* handled by queue-lbl */

  /* ── ROW 2: Main graphic box ─────────────────────────────────────────────── */
  .graphic-body{
    display:flex;align-items:stretch;
    border:1px solid #555;border-top:none;border-bottom:none;
    background:#e8dfc8;
  }

  /* Parchment content area */
  .content-area{
    flex:1;
    background:#e8dfc8;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.018) 2px,rgba(0,0,0,0.018) 4px),
      repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,0.01) 3px,rgba(0,0,0,0.01) 6px);
    background-color:#e8dfc8;
    padding:8px 10px 6px 10px;
    display:flex;align-items:center;gap:8px;
  }

  /* TONIGHT/TODAY stat line */
  .ofer-row{
    padding:0;background:transparent;
    display:flex;align-items:center;gap:8px;flex:1;min-height:0;
  }
  .ofer-val{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:28px;font-weight:800;
    letter-spacing:0px;line-height:1;color:#111;flex:1;
  }
  .ofer-score{
    font-weight:800;font-size:28px;letter-spacing:-0.5px;color:#111;
  }
  .ofer-detail{
    font-style:italic;font-weight:500;font-size:20px;color:#333;
    letter-spacing:0px;
  }
  .ofer-val.emp{color:#888;font-size:14px;font-weight:400;font-style:italic;}

  /* COPY button sits inside content area */
  .copy-btn{
    background:#222;border:1px solid #555;color:#e8dfc8;
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:10px;font-weight:700;padding:5px 10px;
    cursor:pointer;letter-spacing:1.5px;transition:all 0.15s;
    white-space:nowrap;flex-shrink:0;text-transform:uppercase;
    align-self:center;
  }
  .copy-btn:hover{background:#c00;border-color:#c00;color:#fff;}
  .copy-btn.ok{background:var(--green);border-color:var(--green);color:#000;}

  /* ── ROW 3: Stat bar ─ "BA | 0 HR | 0 RBI | .000 OBP" ──────────────────── */
  .stat-bar{
    display:flex;align-items:center;
    background:#111;
    border:1px solid #555;border-top:2px solid #333;
    height:26px;
  }
  .stat-cell{
    flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
    padding:0 4px;
    border-right:1px solid #444;
    height:100%;
  }
  .stat-cell:last-child{border-right:none;}
  /* value first, then label — matches ESPN: "0 HR", ".000 OBP" */
  .stat-cell-val{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:15px;font-weight:800;color:#fff;letter-spacing:0.5px;
  }
  .stat-cell-val.hot{color:#f5a623;}
  .stat-cell-lbl{
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:15px;font-weight:600;color:#fff;letter-spacing:0.5px;
  }
  /* BA field: just the value, no label prefix */
  .stat-cell.ba .stat-cell-lbl{display:none;}
  .stat-cell.ba .stat-cell-val{font-size:15px;}
  .stat-cell.ba::after{
    content:'BA';
    font-family:'Futura Std','Barlow Condensed','Oswald',sans-serif;
    font-size:13px;font-weight:600;color:#fff;margin-left:4px;
  }

  /* hide old elements */
  .stat-row{display:none;}
  .season-strip{display:none;}
  .sb,.sl,.sv{display:none;}

  /* empty state */
  .empty{text-align:center;padding:50px 16px;font-family:'Share Tech Mono',monospace;color:var(--dimmed);font-size:10px;letter-spacing:1px;line-height:2.8;}
  .empty .ico{font-size:28px;margin-bottom:10px;}

  /* empty */
  .empty{text-align:center;padding:50px 16px;font-family:'Share Tech Mono',monospace;color:var(--dimmed);font-size:10px;letter-spacing:1px;line-height:2.8;}
  .empty .ico{font-size:28px;margin-bottom:10px;}

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<header>
  <div class="hdr-l">
    <div class="espn-badge">ESPN</div>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <div class="hdr-title">0-FER Dashboard</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#555;letter-spacing:2px;">ESPN-0Fers V1</div>
    </div>
    <div class="live-pill" id="livePill"><span class="live-dot"></span>LIVE</div>
  </div>
  <div class="hdr-r">
    <span class="timer-txt" id="timerTxt"></span>
    <button class="btn ghost" id="refreshBtn" style="display:none" onclick="doRefresh()">↻ REFRESH</button>
  </div>
</header>

<div class="load-bar">
  <span class="load-lbl">XML FILE</span>
  <div class="file-wrap">
    <button class="file-btn" id="fileBtn" onclick="browseFile()">📂 BROWSE TO LIVE XML...</button>
    <input type="file" id="xmlFallbackInput" accept=".xml" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;" onchange="onFallbackFile(this)">
  </div>
  <span class="file-name" id="fileName">e.g. \\sb-venus-p\xml\2026.xml</span>
  <div class="color-picker-group">
    <span class="color-picker-label">AWAY</span>
    <span class="team-name-badge" id="visColorLabel">—</span>
    <input type="color" class="team-color-swatch" id="visColorPicker" value="#13B5EA" oninput="onColorPick('vis', this.value)" title="Away team color">
  </div>
  <div class="color-picker-group">
    <span class="color-picker-label">HOME</span>
    <span class="team-name-badge" id="homColorLabel">—</span>
    <input type="color" class="team-color-swatch" id="homColorPicker" value="#6CADDE" oninput="onColorPick('hom', this.value)" title="Home team color">
  </div>
  <div class="status-chip">
    <span class="sdot" id="sdot"></span>
    <span id="statusTxt">SELECT XML FILE TO BEGIN</span>
  </div>
</div>

<div class="team-tabs" id="teamTabs">
  <button class="team-tab both active" onclick="setTab('both')">BOTH TEAMS</button>
  <button class="team-tab vis" id="tabVis" onclick="setTab('vis')">AWAY</button>
  <button class="team-tab hom" id="tabHom" onclick="setTab('hom')">HOME</button>
</div>

<div class="score-bar" id="scoreBar">
  <div class="score-inner">
    <div class="score-side vis">
      <div class="s-score-num" id="visRuns">0</div>
      <div class="s-team-info">
        <div class="s-school" id="visSchool">AWAY</div>
        <div class="s-record" id="visHits"></div>
      </div>
    </div>
    <div class="score-mid">
      <div class="inn-badge" id="innBadge">—</div>
      <div class="count-txt" id="countTxt"></div>
      <div class="at-bat-txt" id="atBatTxt"></div>
    </div>
    <div class="score-side hom">
      <div class="s-score-num" id="homRuns">0</div>
      <div class="s-team-info">
        <div class="s-school" id="homSchool">HOME</div>
        <div class="s-record" id="homHits"></div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="t-panel vis" id="visPanel">
    <div class="t-hdr">
      <span class="t-hdr-name" id="visHdr">AWAY</span>
      <span class="t-hdr-sub" id="visRecord"></span>
    </div>
    <div id="visRoster">

function getTeamColors(id, name) {
  const idKey   = (id   || '').toUpperCase().trim();
  const nameKey = (name || '').toUpperCase().trim();

  // 1. Exact ID match
  if (idKey && TEAM_COLORS[idKey]) return TEAM_COLORS[idKey];

  // 2. Exact name match
  if (nameKey && TEAM_COLORS[nameKey]) return TEAM_COLORS[nameKey];

  // 3. Strict partial — name must be a complete word match, not a substring
  //    e.g. "GEORGIA SOUTHERN" should NOT match "GEORGIA"
  //    Only match if the lookup key equals one of the space-separated words
  //    in the team name, or the full name starts with the key
  const nameWords = nameKey.split(/\s+/);
  for (const [k, v] of Object.entries(TEAM_COLORS)) {
    if (k === 'DEFAULT') continue;
    const kWords = k.split(/\s+/);
    // Full key must match full name (already covered above)
    // Allow: key is the full name with extra words, e.g. "GEORGIA SOUTHERN UNIVERSITY" → "GEORGIA SOUTHERN"
    if (nameKey.startsWith(k + ' ') || nameKey.endsWith(' ' + k)) return v;
    // Allow multi-word key to fully appear in name
    if (kWords.length > 1 && nameKey.includes(k)) return v;
  }

  return TEAM_COLORS['DEFAULT'];
}

function applySideColors(side, colors) {
  const root = document.documentElement;
  root.style.setProperty(`--${side}-primary`, colors.primary);
  root.style.setProperty(`--${side}-dark`,    colors.dark);
  // Sync color picker swatch to match
  const picker = document.getElementById(side + 'ColorPicker');
  if (picker) picker.value = colors.primary;
}

function onColorPick(side, hex) {
  colorsLockedFor = colorsLockedFor || 'manual'; // prevent refresh from overwriting
  // Derive a dark version: darken by ~60%
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dr = Math.round(r * 0.35).toString(16).padStart(2,'0');
  const dg = Math.round(g * 0.35).toString(16).padStart(2,'0');
  const db = Math.round(b * 0.35).toString(16).padStart(2,'0');
  const dark = '#' + dr + dg + db;
  applySideColors(side, { primary: hex, dark });
}

// ════════════════════════════════════════════════════════════════════════════
// TODAY / TONIGHT LOGIC
// ════════════════════════════════════════════════════════════════════════════
// If game start time is before 5:00 PM local → "TODAY"
// If game start time is 5:00 PM or later   → "TONIGHT"
function getTodayOrTonight(startTimeStr) {
  // startTimeStr from XML e.g. "12:00 PM" or "7:05 PM"
  if (!startTimeStr) return 'TONIGHT'; // default to tonight if unknown
  try {
    const now = new Date();
    const [time, ampm] = startTimeStr.trim().split(' ');
    let [hours, minutes] = time.split(':').map(Number);
    if (ampm?.toUpperCase() === 'PM' && hours !== 12) hours += 12;
    if (ampm?.toUpperCase() === 'AM' && hours === 12) hours = 0;
    // 5 PM = hour 17
    return hours < 17 ? 'TODAY' : 'TONIGHT';
  } catch(e) {
    return 'TONIGHT';
  }
}

// ════════════════════════════════════════════════════════════════════════════
// FILE + AUTO-REFRESH
// ════════════════════════════════════════════════════════════════════════════
const REFRESH_SEC = 10;
let countdown = 0;
let autoTimer  = null;
let gameLabel  = 'TONIGHT'; // set from XML start time

// ── File handling ────────────────────────────────────────────────────────────
// Uses File System Access API (showOpenFilePicker) on https:// — persistent
// handle, reads live from disk every cycle, no stale errors ever.
// Falls back to <input type="file"> on unsupported browsers.
let fileHandle      = null;
let fallbackFile    = null;
let colorsLockedFor = null;

async function browseFile() {
  if (typeof window.showOpenFilePicker === 'function') {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'XML Files', accept: { 'text/xml': ['.xml'] } }],
        multiple: false
      });
      fileHandle   = handle;
      fallbackFile = null;
      colorsLockedFor = null;
      const file = await handle.getFile();
      setFileName(file.name);
      document.getElementById('refreshBtn').style.display = 'inline-block';
      await readXML();
      startAutoRefresh();
    } catch(e) {
      if (e.name !== 'AbortError') setStat('err', 'COULD NOT OPEN FILE');
    }
  } else {
    document.getElementById('xmlFallbackInput').click();
  }
}

function onFallbackFile(input) {
  if (!input.files || !input.files[0]) return;
  fallbackFile = input.files[0];
  colorsLockedFor = null; // reset so new file gets fresh auto-colors
  // Reset button in case it was showing a stale-file warning
  const btn = document.getElementById('fileBtn');
  if (btn) { btn.style.borderColor = ''; btn.style.color = ''; }
  setFileName(fallbackFile.name);
  document.getElementById('refreshBtn').style.display = 'inline-block';
  readXML();
  startAutoRefresh();
}

function setFileName(name) {
  document.getElementById('fileName').textContent = name;
  document.getElementById('fileBtn').textContent  = '📂 ' + name;
  document.getElementById('refreshBtn').style.display = 'inline-block';
}

function startAutoRefresh() {
  if (autoTimer) clearInterval(autoTimer);
  countdown = REFRESH_SEC;
  updateTimer();
  autoTimer = setInterval(async () => {
    countdown--;
    updateTimer();
    if (countdown <= 0) { countdown = REFRESH_SEC; await readXML(); }
  }, 1000);
}

async function doRefresh() { countdown = REFRESH_SEC; await readXML(); }

function updateTimer() {
  document.getElementById('timerTxt').innerHTML =
    `REFRESH IN <b>${countdown}s</b>`;
}

// Read the selected XML file
async function readXML() {
  if (!fileHandle && !fallbackFile) return;
  setStat('spin', 'READING...');
  try {
    let text;
    if (fileHandle) {
      // FSA: check/request permission before every read
      let perm = await fileHandle.queryPermission({ mode: 'read' });
      if (perm !== 'granted') {
        perm = await fileHandle.requestPermission({ mode: 'read' });
      }
      if (perm !== 'granted') {
        setStat('err', 'PERMISSION DENIED — CLICK ALLOW IN BROWSER PROMPT');
        return;
      }
      const file = await fileHandle.getFile();
      text = await file.text();
    } else {
      text = await fallbackFile.text();
    }
    parseGame(text);
  } catch(e) {
    if (fileHandle) {
      // FSA handle went bad — try to silently re-request permission next cycle
      setStat('err', 'READ ERROR — WILL RETRY...');
      console.warn('FSA read error:', e.message);
    } else {
      // Fallback file gone stale — prompt re-select
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      const fname = fallbackFile?.name || '2026.xml';
      setStat('err', `FILE STALE — RE-SELECT ${fname} TO RESUME`);
      const btn = document.getElementById('fileBtn');
      if (btn) {
        btn.style.borderColor = '#d00';
        btn.style.color = '#d00';
        btn.textContent = '⚠ RE-SELECT ' + fname;
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════════════════
// XML PARSING
// ════════════════════════════════════════════════════════════════════════════
function parseGame(xmlText) {
  try {
    const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');

    const venue  = xml.querySelector('venue');
    const status = xml.querySelector('status');
    const teams  = [...xml.querySelectorAll('team')];
    if (teams.length < 2) throw new Error('Need 2 teams');

    const visTeam = teams.find(t => t.getAttribute('vh') === 'V') || teams[0];
    const homTeam = teams.find(t => t.getAttribute('vh') === 'H') || teams[1];

    // Game start time → Today vs Tonight
    const startTime = venue?.getAttribute('start') || '';
    gameLabel = getTodayOrTonight(startTime);

    // Team colors
    const visId   = visTeam.getAttribute('id') || '';
    const visName = visTeam.getAttribute('name') || '';
    const homId   = homTeam.getAttribute('id') || '';
    const homName = homTeam.getAttribute('name') || '';
    // Only auto-apply colors on first load or when teams change
    // After that, user's color picker selection is preserved
    if (!colorsLockedFor || colorsLockedFor !== visName + homName) {
      applySideColors('vis', getTeamColors(visId, visName));
      applySideColors('hom', getTeamColors(homId, homName));
      colorsLockedFor = visName + homName;
    }


    // Score
    const visLS = visTeam.querySelector('linescore');
    const homLS = homTeam.querySelector('linescore');

    // Status
    const inning   = status?.getAttribute('inning')  || '1';
    const complete = status?.getAttribute('complete') === 'Y';
    const endInn   = status?.getAttribute('endinn')   === 'Y';
    const topBot   = status?.getAttribute('vh')       || 'V';
    const outs     = status?.getAttribute('outs')     || '0';
    const balls    = status?.getAttribute('b')        || '0';
    const strikes  = status?.getAttribute('s')        || '0';
    const curBtr   = status?.getAttribute('batter')   || '';

    // Players
    const visPlayers = parsePlayers(visTeam);
    const homPlayers = parsePlayers(homTeam);

    // ── Paint ──
    setText('visSchool', visName); setText('visHdr', visName);
    setText('homSchool', homName); setText('homHdr', homName);
    updateTabs(visName, homName);
    setText('visRuns', visLS?.getAttribute('runs') ?? '0');
    setText('homRuns', homLS?.getAttribute('runs') ?? '0');
    setText('visHits', `${visLS?.getAttribute('hits') ?? 0} H · ${visLS?.getAttribute('errs') ?? 0} E`);
    setText('homHits', `${homLS?.getAttribute('hits') ?? 0} H · ${homLS?.getAttribute('errs') ?? 0} E`);

    const innLabel = complete
      ? 'FINAL'
      : `INN ${inning} ${endInn ? '(END)' : topBot === 'V' ? '▲ TOP' : '▼ BOT'}`;
    setText('innBadge', innLabel);
    setText('countTxt', complete ? '' : `${balls}-${strikes}  |  ${outs} OUT${outs==='1'?'':'S'}`);
    setText('atBatTxt', curBtr ? `AT BAT: ${curBtr}` : '');

    document.getElementById('scoreBar').classList.add('on');
    document.getElementById('livePill').classList.add('on');    renderRoster('visRoster', 'vis', visPlayers, curBtr, topBot === 'V');
    renderRoster('homRoster', 'hom', homPlayers, curBtr, topBot === 'H');

    setStat('ok', `UPDATED ${new Date().toLocaleTimeString()} · ${visName} vs ${homName}`);
  } catch(e) {
    setStat('err', e.message);
    console.error(e);
  }
}

function parsePlayers(teamEl) {
  const list = [];
  teamEl.querySelectorAll('player').forEach(p => {
    const spot = n(p.getAttribute('spot'));
    const gp   = n(p.getAttribute('gp'));
    if (spot === 0 && gp === 0) return;
      if (spot > 9) return; // only show batting order spots 1-9

    const hit = p.querySelector('hitting');
    const sea = p.querySelector('hitseason');
    const h   = n(hit?.getAttribute('h'));
    const d   = n(hit?.getAttribute('double'));
    const t   = n(hit?.getAttribute('triple'));
    const hr  = n(hit?.getAttribute('hr'));

    list.push({
      name : p.getAttribute('name')      || '',
      short: p.getAttribute('shortname') || '',
      uni  : p.getAttribute('uni')       || '',
      pos  : (p.getAttribute('atpos') || p.getAttribute('pos') || '').toUpperCase(),
      spot,
      ab  : n(hit?.getAttribute('ab')),
      h,
      r   : n(hit?.getAttribute('r')),
      rbi : n(hit?.getAttribute('rbi')),
      so  : n(hit?.getAttribute('so')),
      bb  : n(hit?.getAttribute('bb')),
      s   : Math.max(0, h - d - t - hr),
      d, t, hr,
      sb  : n(hit?.getAttribute('sb')),
      sf  : n(hit?.getAttribute('sf')),
      gidp: n(hit?.getAttribute('gdp') || hit?.getAttribute('gidp')),
      roe : n(hit?.getAttribute('roe')),
      savg: sea?.getAttribute('avg') || '',
      shr : n(sea?.getAttribute('hr')),
      srbi: n(sea?.getAttribute('rbi')),

    });
  });
  // Base sort by batting spot
  list.sort((a,b) => {
    if (a.spot===0 && b.spot===0) return 0;
    if (a.spot===0) return 1;
    if (b.spot===0) return -1;
    return a.spot - b.spot;
  });
  return list;
}

// ════════════════════════════════════════════════════════════════════════════
// ESCALATOR SORT
// Rotates the lineup so the current batter is always at top,
// followed by next batters in order wrapping around the lineup.
// The non-batting team keeps normal order.
// ════════════════════════════════════════════════════════════════════════════
function escalatorSort(players, curBtr, isThisBatting) {
  const lineup = players.filter(p => p.spot >= 1 && p.spot <= 9);
  const bench  = []; // extras/subs not shown

  if (!isThisBatting || !curBtr || lineup.length === 0) {
    return [...lineup, ...bench];
  }

  const curIdx = lineup.findIndex(p =>
    p.short === curBtr ||
    p.name  === curBtr ||
    p.short.toLowerCase() === curBtr.toLowerCase() ||
    p.name.toLowerCase()  === curBtr.toLowerCase()
  );

  if (curIdx === -1) return [...lineup, ...bench];

  // Rotate so current batter is index 0
  const rotated = [...lineup.slice(curIdx), ...lineup.slice(0, curIdx)];
  return [...rotated, ...bench];
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════════════
function renderRoster(elId, side, players, curBtr, isThisBatting) {
  const el = document.getElementById(elId);
  if (!players.length) {
    el.innerHTML = '<div class="empty"><div class="ico">—</div>NO DATA</div>';
    return;
  }

  const ordered = escalatorSort(players, curBtr, isThisBatting);

  el.innerHTML = ordered.map((p, idx) => {
    const isCur = isThisBatting && (
      p.short === curBtr ||
      p.name  === curBtr ||
      p.short.toLowerCase() === curBtr.toLowerCase() ||
      p.name.toLowerCase()  === curBtr.toLowerCase()
    );

    let qLabel = '';
    if (isThisBatting && p.spot > 0) {
      if (isCur)        qLabel = '▶ NOW';
      else if (idx===1) qLabel = 'ON DECK';
      else if (idx===2) qLabel = 'IN THE HOLE';
    }

    const ofer    = buildOfer(p);
    const safe    = ofer.text.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    const cardCls = isCur ? ' at-bat' : '';

    const hdrRight = qLabel
      ? '<div class="pcard-hdr-right"><span class="queue-lbl' + (isCur?' queue-now':'') + '">' + qLabel + '</span></div>'
      : '';

    // Split ofer text into bold score + italic detail
    let oferHTML = '';
    if (ofer.cls === 'emp') {
      oferHTML = '<span class="ofer-val emp">—</span>';
    } else {
      const parenIdx  = ofer.text.indexOf('(');
      const scorePart = parenIdx > -1 ? ofer.text.substring(0, parenIdx).trim() : ofer.text;
      const detailPart= parenIdx > -1 ? ofer.text.substring(parenIdx) : '';
      oferHTML =
        '<span class="ofer-val ' + ofer.cls + '">' +
          '<span class="ofer-score">' + gameLabel + ': ' + scorePart + '</span>' +
          (detailPart ? ' <span class="ofer-detail">' + detailPart + '</span>' : '') +
        '</span>';
    }

    // Season stat bar: AVG | HR | RBI
    const avg   = p.savg || '---';
    const shr   = (p.shr  != null) ? p.shr  : '0';
    const srbi  = (p.srbi != null) ? p.srbi : '0';
    const isHot = p.savg && parseFloat(p.savg) >= 0.300;
    const statBar =
      '<div class="stat-bar">' +
        '<div class="stat-cell ba"><span class="stat-cell-val' + (isHot?' hot':'') + '">' + avg + '</span><span class="stat-cell-lbl"> BA</span></div>' +
        '<div class="stat-cell"><span class="stat-cell-val">' + shr  + '</span><span class="stat-cell-lbl"> HR</span></div>' +
        '<div class="stat-cell"><span class="stat-cell-val">' + srbi + '</span><span class="stat-cell-lbl"> RBI</span></div>' +
      '</div>';

    return (
      '<div class="pcard' + cardCls + '">' +
        '<div class="pcard-hdr">' +
          '<div class="pcard-hdr-left">' +
            '<span class="p-uni">#' + p.uni + '</span>' +
            '<span class="p-name">' + p.name + '</span>' +
            '<span class="p-pos">' + (p.pos||'—') + '</span>' +
          '</div>' +
          hdrRight +
        '</div>' +
        '<div class="graphic-body">' +
          '<div class="content-area">' +
            '<div class="ofer-row">' +
              oferHTML +
              '<button class="copy-btn" onclick="copyIt(this,\'' + safe + '\')">COPY</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        statBar +
      '</div>'
    );
  }).join('');
}


function sb(lbl, val) {
  const z   = !val || val===0;
  const hot = !z && (lbl==='H'||lbl==='HR'||lbl==='RBI') && val>=2;
  return `<div class="sb"><div class="sl">${lbl}</div><div class="sv${z?' z':hot?' hot':''}">${val||0}</div></div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// ESPN 0-FER ENGINE — strict guide compliance
// ════════════════════════════════════════════════════════════════════════════
function buildOfer(p) {
  const { ab, h, rbi, r, so, bb, s, d, t, hr, gidp, sb, sf, roe } = p;

  // RULE 3: No official AB recorded yet — never show 0-0
  if (ab === 0 && h === 0) {
    if (sf > 0) return { text:'Sac Fly', cls:'neu' };           // RULE 8
    if (bb > 0) return { text: bb===1?'Walk':`${bb} Walks`, cls:'neu' };
    return { text:'—', cls:'emp' };
  }

  const abStr = `${h}-${ab}`;

  // ── HAS HITS ──────────────────────────────────────────────────────────────
  if (h > 0) {
    const parts = [];

    // RULE 7: Most important first: HR > 3B > 2B > 1B
    // RULE 5: Spell out single HR type; multiple = "X HR"
    if (hr > 0) {
      parts.push(hr === 1 ? hrLabel(rbi, s, d, t, p.hbp||0, p.sf||0) : `${hr} HR`);
    }
    if (t > 0) parts.push(t===1 ? 'Triple'  : `${t} Triples`);
    if (d > 0) parts.push(d===1 ? 'Double'  : `${d} Doubles`);
    if (s > 0) parts.push(s===1 ? 'Single'  : `${s} Singles`);

    // RULE 6: RBI attachment
    // Calculate RBI that are NOT already implied by HR type label or Sac Fly
    // HR label implies exactly hrRbi RBI; Sac Fly always implies 1 RBI
    const hrRbiImplied = hr > 0
      ? (hr===1 ? Math.min(rbi, Math.max(0, rbi - (s+d+t+(p.hbp||0)+(p.sf||0)))) : 0)
      : 0;
    const sfRbiImplied = sf > 0 ? sf : 0;  // each SF implies 1 RBI
    const remainingRbi = Math.max(0, rbi - hrRbiImplied - sfRbiImplied);

    if (remainingRbi > 0) {
      const hitTypes = (t>0?1:0)+(d>0?1:0)+(s>0?1:0);
      // Find the first non-HR hit part to attach RBI to
      const firstHitIdx = parts.findIndex(p => !p.includes('HR') && !p.includes('Grand Slam'));
      if (h===1 && hitTypes===1 && hr===0 && firstHitIdx >= 0) {
        // Single hit type, no HR → attach: "RBI Double"
        parts[firstHitIdx] = (remainingRbi===1?'RBI':`${remainingRbi} RBI`) + ' ' + parts[firstHitIdx];
      } else {
        // Multiple hit types or HR also present → list separately
        parts.push(remainingRbi===1?'RBI':`${remainingRbi} RBI`);
      }
    }

    if (r  > 0) parts.push(r===1?'Run':`${r} Runs`);
    if (sf > 0) parts.push('Sac Fly');                         // RULE 8: never "Sac Fly RBI"
    if (sb > 0) parts.push(sb===1?'SB':`${sb} SB`);                       // RULE 4: SB shorthand OK
    if (bb > 0) parts.push(bb===1?'Walk':`${bb} Walks`);

    return { text:`${abStr}${parts.length?` (${parts.join(', ')})` :''}`, cls:'pos' };
  }

  // ── 0-FER ─────────────────────────────────────────────────────────────────
  // RULES 1 & 2: only K, GIDP, Sac Fly, ROE. Strikeouts drop the moment hits exist (handled above).
  const neg = [];
  if (so   > 0) neg.push(so===1?'Strikeout':`${so} Strikeouts`);
  if (gidp > 0) neg.push('GIDP');                              // RULE 4: GIDP shorthand OK
  if (sf   > 0) neg.push('Sac Fly');                          // RULE 8
  if (roe  > 0) neg.push('Reached on Error');

  // Walks never shown in a 0-fer (Rule 1 — only K, GIDP, Sac Fly, ROE)
  if (neg.length) return { text:`${abStr} (${neg.join(', ')})`, cls:'neg' };
  return { text:abStr, cls:'neg' };
}

// RULE 5: infer HR type from RBI count
// Accounts for ALL other RBI sources — hits, HBP, sac fly — before
// estimating how many RBI came from the home run specifically.
function hrLabel(rbi, s, d, t, hbp=0, sf=0) {
  const otherRbiSources = s + d + t + hbp + sf;

  if (otherRbiSources === 0) {
    // No other RBI sources — all RBI came from the HR
    if (rbi >= 4) return 'Grand Slam';
    if (rbi === 3) return '3-Run Home Run';
    if (rbi === 2) return '2-Run Home Run';
    return 'Solo Home Run';
  }

  // Subtract minimum RBI attributable to other sources (1 per source)
  // This gives the maximum RBI the HR could have produced
  const estHrRbi = Math.max(0, rbi - otherRbiSources);

  if (estHrRbi >= 4) return 'Grand Slam';
  if (estHrRbi === 3) return '3-Run Home Run';
  if (estHrRbi === 2) return '2-Run Home Run';
  return 'Solo Home Run';
}

// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
function n(v)       { return parseInt(v) || 0; }
function setText(id,v){ const el=document.getElementById(id); if(el) el.textContent=v; }
function setStat(s,t){ document.getElementById('sdot').className=`sdot ${s}`; document.getElementById('statusTxt').textContent=t; }

function copyIt(btn, text) {
  const copy = () => {
    btn.textContent='✓ COPIED!'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='COPY FOR DASHBOARD'; btn.classList.remove('ok'); }, 1800);
  };
  navigator.clipboard?.writeText(text).then(copy).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); copy();
  });
}



// ════════════════════════════════════════════════════════════════════════════
// TEAM TAB — show both, away only, or home only
// ════════════════════════════════════════════════════════════════════════════
let activeTab = 'both';

function setTab(tab) {
  activeTab = tab;
  const visPanel = document.getElementById('visPanel');
  const homPanel = document.getElementById('homPanel');
  const main     = document.querySelector('.main');

  document.querySelectorAll('.team-tab').forEach(b => b.classList.remove('active'));
  const sel = tab === 'both' ? '.team-tab.both' : '.team-tab.' + tab;
  document.querySelector(sel).classList.add('active');

  if (tab === 'vis') {
    visPanel.style.display = 'block';
    homPanel.style.display = 'none';
    main.style.gridTemplateColumns = '1fr';
  } else if (tab === 'hom') {
    visPanel.style.display = 'none';
    homPanel.style.display = 'block';
    main.style.gridTemplateColumns = '1fr';
  } else {
    visPanel.style.display = 'block';
    homPanel.style.display = 'block';
    main.style.gridTemplateColumns = window.innerWidth > 768 ? '1fr 1fr' : '1fr';
  }
}

function updateTabs(visName, homName) {
  const tabVis = document.getElementById('tabVis');
  const tabHom = document.getElementById('tabHom');
  if (tabVis) tabVis.textContent = visName || 'AWAY';
  if (tabHom) tabHom.textContent = homName || 'HOME';
  document.getElementById('teamTabs').classList.add('visible');
  // Update color label badges
  const visLbl = document.getElementById('visColorLabel');
  const homLbl = document.getElementById('homColorLabel');
  if (visLbl) visLbl.textContent = visName || '—';
  if (homLbl) homLbl.textContent = homName || '—';
}

window.addEventListener('resize', () => {
  if (activeTab === 'both') {
    document.querySelector('.main').style.gridTemplateColumns =
      window.innerWidth > 768 ? '1fr 1fr' : '1fr';
  }
});
